<!DOCTYPE html>
<html lang="kr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>사전 서식 태그 예제</title>
</head>
<body>
    <h1>시의 예</h1>
    <pre>
        <b>바람</b>이 불어오는 곳
        그곳에 내 <strong>마음</strong>이 머무네

        <div><span style="color:red;"><b>바람</b>이 그치는 곳
        그곳에 내 <strong>꿈</strong>이 쉬어가네</span></div>
       
    </pre>
</body>
</html>
