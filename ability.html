<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>김준태의 자기소개 페이지 - 개인 역량</title>
    <style>
        /* 기본 스타일 초기화 및 전체 여백 */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        
        body {
            font-family: 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif;
            background-color: #faf9f8;
            color: #333333;
            line-height: 1.6;
            padding: 40px 20px;
            max-width: 800px;
            margin: 0 auto;
        }

        /* 1. 둥글둥글하고 트렌디한 메뉴바 */
        #manubar {
            background: rgb(158, 61, 6);
            border-radius: 30px; /* 완전하게 둥근 모서리 */
            box-shadow: 0 4px 12px rgba(158, 61, 6, 0.15); /* 부드러운 그림자 */
            margin-bottom: 40px;
            overflow: hidden;
        }
        
        #manubar ul {
            display: flex;
            justify-content: space-around;
            list-style-type: none;
            padding: 15px 25px;
        }
        
        #manubar ul li {
            display: inline-block;
        }
        
        #manubar ul li a {
            color: white;
            text-decoration: none;
            font-weight: bold;
            font-size: 15px;
            padding: 8px 18px;
            border-radius: 20px; /* 호버 시 나타나는 배경도 둥글게 */
            transition: all 0.3s ease;
        }
        
        #manubar ul li a:hover {
            background-color: rgba(255, 255, 255, 0.2);
            color: #ffffff;
        }

        /* 제목 스타일 */
        h1 {
            font-size: 30px;
            color: #111;
            margin-bottom: 10px;
        }

        h2 {
            font-size: 22px;
            color: rgb(158, 61, 6);
            margin-top: 35px;
            margin-bottom: 15px;
        }

        /* 부드러운 구분선 */
        hr {
            border: none;
            height: 1px;
            background-color: #e5e5e5;
            margin: 20px 0 30px 0;
        }

        /* 2. 각진 부분을 깎아 둥글게 만든 기본 정보 테이블 */
        .profile-table {
            width: 100%;
            border-collapse: separate; /* border-radius 적용을 위해 separate 사용 */
            border-spacing: 0;
            margin-top: 20px;
            font-size: 16px;
            border-radius: 12px; /* 테이블 전체 모서리 둥글게 */
            overflow: hidden;
            border: 1px solid #e2e8f0;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.05); /* 은은한 입체감 */
        }

        .profile-table th {
            background: #162436;
            color: white;
            padding: 14px 16px;
            text-align: left;
            font-weight: bold;
        }

        .profile-table td {
            padding: 14px 16px;
            border-bottom: 1px solid #e2e8f0;
            background: white;
            color: #333;
        }

        /* 마지막 행 테두리 지우기 (모서리 둥글기 깸 방지) */
        .profile-table tbody tr:last-child td {
            border-bottom: none;
        }

        .profile-table td:first-child {
            width: 180px;
            font-weight: bold;
            background: #f8fafc; /* 왼쪽 구분 열 배경을 차분하게 */
            color: #475569;
        }

        /* 테이블 마우스 호버 효과 */
        .profile-table tbody tr:hover td {
            background: #f1f5f9;
        }

        /* 3. 개인 역량 리스트를 둥근 태그(알약) 형태로 변경 */
        .ability-list {
            list-style-type: none;
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-top: 15px;
        }

        .ability-list li {
            background-color: #f5eae4;
            color: rgb(158, 61, 6);
            padding: 10px 22px;
            border-radius: 50px; /* 완벽하게 둥근 모서리 */
            font-weight: bold;
            font-size: 15px;
            border: 1px solid rgba(158, 61, 6, 0.15);
            transition: transform 0.2s ease, background-color 0.2s ease;
        }

        /* 태그에 마우스 올리면 살짝 튀어나오는 인터랙션 */
        .ability-list li:hover {
            transform: translateY(-3px);
            background-color: rgb(158, 61, 6);
            color: white;
        }
    </style>
</head>
<body>

    <!-- 둥근 상단 메뉴바 -->
    <nav id="manubar">
        <ul>
            <li><a href="index.html">메인 페이지</a></li>
            <li><a href="ability.html">개인 역량</a></li> <!-- 닫는 태그 수정 -->
            <li><a href="future.html">장래 희망</a></li>
            <li><a href="tmi.html">인간 김준태의 TMI</a></li>
        </ul>
    </nav>

    <h1>세부페이지 1 : 개인 역량</h1>
    <hr>

    <h2>기본 정보</h2>
    <table class="profile-table">
        <thead>
            <tr>
                <th>구분</th>
                <th>내용</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>이름</td>
                <td>김준태</td>
            </tr>
            <tr>
                <td>관심 분야</td>
                <td>컴퓨터, 전기전자, 물리학, 화학</td>
            </tr>
            <tr>
                <td>좌우명</td>
                <td>일단 들이받고 생각은 나중에 💥</td>
            </tr>
        </tbody>
    </table>

    <h2>개인 역량</h2>
    <!-- 둥근 태그 디자인이 적용된 역량 리스트 -->
    <ul class="ability-list">
        <li>HTTPS</li>
        <li>CSS</li>
        <li>JavaScript</li>
    </ul>

</body>
</html>
